version: "3"
services:
  cleancode-course-controle-2:
    container_name: cleancode-course-controle-2
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    restart: unless-stopped
    environment:
      - PUID=1000
      - GUID=1000
      - TZ=Europe/Paris
      - HOST=0.0.0.0
    ports:
      - '8888:8000'
    volumes:
      - ./:/home/cleancode-course-controle-2:cached
